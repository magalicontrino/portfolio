<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>magalicontrino</title>
<meta name="description" content="Webdesign et Photographie" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png?v=fcd6d0f1" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png?v=48de6cd6" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/img/favicon-192.png?v=fd043c82" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="assets/img/favicon-180.png?v=7a5aee63" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
  #stage { position: fixed; inset: 0; }
  #stage iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  /* La page d'entrée couvre le portfolio, puis s'efface quand on suit la flèche. */
  #entree { z-index: 2; transition: opacity .8s ease; }
  #entree.gone { opacity: 0; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) { #entree { transition: none; } }
</style>
</head>
<body>

<!--
  Les deux étages du site tiennent à cette seule adresse. Chacun garde son propre
  document : ils définissent chacun leurs règles html/body, et les fusionner
  décalerait la mise en page (les tailles en rem dépendent du font-size racine,
  que la page d'entrée redéfinit à chaque palier).
-->
<div id="stage">
  <iframe id="accueil" title="Portfolio — accueil" src="accueil/"></iframe>
  <iframe id="entree" title="Page d'entrée" src="entree/"></iframe>
</div>

<script>
  var entree = document.getElementById('entree');
  addEventListener('message', function (e) {
    if (e.data !== 'enter' || !entree) return;
    entree.classList.add('gone');
    setTimeout(function () { entree.remove(); entree = null; }, 800);
  });
</script>

</body>
</html>
